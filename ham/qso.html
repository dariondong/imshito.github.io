<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>QSO 详情 | BG7LZQ - Darion</title>
        <link rel="preconnect" href="https://fonts.googleapis.cn">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.cn/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <script src="https://cdn.bootcdn.net/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    </head>
    <style>
        :root {
            --primary-color: #ffffff;
            --secondary-color: #888888;
            --accent-color: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --glass-blur: blur(20px);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.5);
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
            --ease-out-back: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: #000000;
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
        }

        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: -2;
            overflow: hidden;
        }

        .video-bg {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.6;
            transition: opacity 0.8s var(--ease-out-expo), transform 8s ease-out;
        }

        .video-container.scrolled .video-bg {
            opacity: 0.3;
            transform: scale(1.05);
        }

        .video-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: linear-gradient(
                180deg,
                rgba(0, 0, 0, 0.5) 0%,
                rgba(0, 0, 0, 0.7) 50%,
                rgba(0, 0, 0, 0.9) 100%
            );
            z-index: -1;
            pointer-events: none;
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: 1.5rem 3rem;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.6s var(--ease-out-expo);
        }

        nav.scrolled {
            padding: 0.8rem 3rem;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        }

        .nav-logo {
            font-size: 1.4rem;
            font-weight: 500;
            color: var(--text-primary);
            letter-spacing: 6px;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 3rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 400;
            font-size: 0.85rem;
            letter-spacing: 2px;
            padding: 0.5rem 0;
            position: relative;
            transition: color 0.4s var(--ease-out-expo);
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 1px;
            background: var(--text-primary);
            transition: all 0.4s var(--ease-out-expo);
            transform: translateX(-50%);
        }

        .nav-links a:hover {
            color: var(--text-primary);
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .hero {
            min-height: 30vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 8rem 2rem 2rem;
            position: relative;
        }

        .hero-content {
            max-width: 700px;
            opacity: 0;
            transform: translateY(40px);
            animation: heroEnter 1.2s var(--ease-out-expo) forwards;
            animation-delay: 1.5s;
        }

        @keyframes heroEnter {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero-badge {
            display: inline-block;
            padding: 0.6rem 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            font-size: 0.7rem;
            color: var(--text-secondary);
            letter-spacing: 3px;
            margin-bottom: 1rem;
            text-transform: uppercase;
        }

        .hero-title {
            font-size: clamp(1.8rem, 4vw, 2.5rem);
            font-weight: 300;
            line-height: 1.15;
            color: var(--text-primary);
            letter-spacing: 4px;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 0 2rem;
            position: relative;
            z-index: 1;
        }

        .qso-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 4px;
            padding: 2.5rem;
            position: relative;
            overflow: hidden;
        }

        .qso-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: rgba(255, 255, 255, 0.2);
        }

        .qso-header {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 1rem;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .qso-header-main {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .qso-with {
            color: var(--text-secondary);
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        .qso-callsign {
            font-family: 'Space Mono', monospace;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 4px;
            color: var(--text-primary);
        }

        .qso-mode {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        .qso-info {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
        }

        .info-item {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .info-label {
            color: var(--text-secondary);
            font-size: 0.75rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .info-value {
            color: var(--text-primary);
            font-size: 1rem;
            font-weight: 400;
            letter-spacing: 1px;
        }

        .info-value.power {
            font-family: 'Space Mono', monospace;
        }

        .info-full {
            grid-column: span 3;
        }

        .qso-qr {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.8rem;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        .qso-link {
            display: flex;
            justify-content: center;
            margin-top: 1.5rem;
        }

        .qso-link .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.8rem 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            color: var(--text-primary);
            text-decoration: none;
            font-size: 0.85rem;
            letter-spacing: 1px;
            transition: all 0.4s var(--ease-out-expo);
        }

        .qso-link .btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
        }

        #qrcode {
            background: #ffffff;
            padding: 0.8rem;
            border-radius: 4px;
        }

        #qrcode canvas {
            display: block;
        }

        .qr-label {
            color: var(--text-secondary);
            font-size: 0.75rem;
            letter-spacing: 1px;
        }

        .info-value.freq {
            font-family: 'Space Mono', monospace;
            font-size: 1.1rem;
        }

        .info-value.rst {
            font-family: 'Space Mono', monospace;
            font-size: 1.2rem;
        }

        .qso-remark {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        .qso-remark .info-label {
            margin-bottom: 0.5rem;
        }

        .qso-remark .info-value {
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.85rem;
            letter-spacing: 1px;
            transition: all 0.4s var(--ease-out-expo);
            margin-bottom: 2rem;
        }

        .back-link:hover {
            color: var(--text-primary);
            gap: 0.8rem;
        }

        footer {
            padding: 3rem 0;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
            z-index: 1;
            margin-top: 4rem;
        }

        .footer-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 2rem;
        }

        .footer-logo {
            font-size: 1.2rem;
            font-weight: 400;
            letter-spacing: 4px;
            color: var(--text-secondary);
        }

        .footer-links {
            display: flex;
            gap: 2.5rem;
            list-style: none;
        }

        .footer-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 1px;
            transition: color 0.3s ease;
        }

        .footer-links a:hover {
            color: var(--text-primary);
        }

        .footer-copy {
            width: 100%;
            text-align: center;
            padding-top: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--text-secondary);
            font-size: 0.75rem;
            letter-spacing: 1px;
        }

        .page-loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s var(--ease-out-expo), visibility 0.8s;
        }

        .page-loader.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loader-content {
            text-align: center;
        }

        .loader-spinner {
            width: 50px;
            height: 50px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--text-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loader-text {
            color: var(--text-secondary);
            font-size: 0.85rem;
            letter-spacing: 3px;
        }

        @media (max-width: 768px) {
            nav {
                padding: 1rem 1.5rem;
            }

            nav.scrolled {
                padding: 0.8rem 1.5rem;
            }

            .nav-links {
                display: none;
            }

            .qso-info {
                grid-template-columns: 1fr;
            }

            .info-full {
                grid-column: span 1;
            }

            .qso-header {
                align-items: center;
            }

            .qso-header-main {
                flex-direction: column;
            }

            .qso-callsign {
                font-size: 1.5rem;
            }

            .footer-content {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>

    <div class="page-loader" id="pageLoader">
        <div class="loader-content">
            <div class="loader-spinner"></div>
            <div class="loader-text">LOADING</div>
        </div>
    </div>

    <div class="video-container" id="videoContainer">
        <video class="video-bg" autoplay muted loop playsinline id="bgVideo">
            <source src="../taikongdianti.mp4" type="video/mp4">
        </video>
        <div class="video-overlay"></div>
    </div>

    <body>
        <nav id="navbar">
            <a href="../index.html" class="nav-logo">DARION</a>
            <ul class="nav-links">
                <li><a href="../index.html#home">首页</a></li>
                <li><a href="index.html">无线电</a></li>
                <li><a href="log.html">日志</a></li>
                <li><a href="../index.html#contact">联系</a></li>
                <li><a href="../index.html#about">关于</a></li>
            </ul>
        </nav>

        <section class="hero">
            <div class="hero-content">
                <div class="hero-badge">
                    QSO Detail
                </div>
                <h1 class="hero-title">通联详情</h1>
            </div>
        </section>

        <div class="container">
            <a href="log.html" class="back-link">
                <i class="fas fa-arrow-left"></i>
                返回日志列表
            </a>

            <div class="qso-card">
                <div class="qso-header">
                    <div class="qso-header-main">
                        <span class="qso-callsign" id="callsign">BG7LZQ</span>
                        <span class="qso-mode" id="mode">FM</span>
                    </div>
                    <span class="qso-with">与 BG7LZQ 通联</span>
                </div>

                <div class="qso-info">
                    <div class="info-item">
                        <span class="info-label">日期</span>
                        <span class="info-value" id="date">2026-01-15</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">时间</span>
                        <span class="info-value" id="time">08:30</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">频率</span>
                        <span class="info-value freq" id="freq">439.125 MHz</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">模式</span>
                        <span class="info-value" id="mode">FM</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">信号报告</span>
                        <span class="info-value rst" id="rst">59</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">功率</span>
                        <span class="info-value power" id="power">5W</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">设备</span>
                        <span class="info-value" id="radio">森海克斯8600PRO</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">天线</span>
                        <span class="info-value" id="antenna">老鹰771</span>
                    </div>
                    <div class="info-item info-full">
                        <span class="info-label">备注</span>
                        <span class="info-value" id="remark">高州中继测试通联</span>
                    </div>
                </div>

                <div class="qso-link">
                    <a href="https://www.qrz.com/db/" id="qrzLink" class="btn btn-glass" target="_blank">
                        <i class="fas fa-external-link-alt"></i>
                        在 QRZ 查看该呼号
                    </a>
                </div>

                <div class="qso-qr">
                    <div id="qrcode"></div>
                    <span class="qr-label">扫码分享</span>
                </div>
            </div>
        </div>

        <footer>
            <div class="container">
                <div class="footer-content">
                    <div class="footer-logo">DARION</div>
                    <ul class="footer-links">
                        <li><a href="../index.html#home">首页</a></li>
                        <li><a href="../index.html#about">关于</a></li>
                        <li><a href="https://github.com/dariondong">GitHub</a></li>
                        <li><a href="https://gitcode.com/DarionDong">GitCode</a></li>
                        <li><a href="https://gitee.com/dariondong">Gitee</a></li>
                    </ul>
                </div>
                <div class="footer-copy">
                    © 2026 DARION — IMSHITO.EU.ORG
                </div>
            </div>
        </footer>

        <script>
            const navbar = document.getElementById('navbar');
            const videoContainer = document.getElementById('videoContainer');
            const pageLoader = document.getElementById('pageLoader');

            window.addEventListener('load', function() {
                setTimeout(function() {
                    pageLoader.classList.add('hidden');
                }, 800);
            });

            window.addEventListener('scroll', function() {
                const scrollY = window.scrollY;
                
                if (scrollY > 50) {
                    navbar.classList.add('scrolled');
                    videoContainer.classList.add('scrolled');
                } else {
                    navbar.classList.remove('scrolled');
                    videoContainer.classList.remove('scrolled');
                }
            });

            function getQueryParam(param) {
                const urlParams = new URLSearchParams(window.location.search);
                return urlParams.get(param);
            }

            document.getElementById('callsign').textContent = getQueryParam('callsign') || '-';
            document.getElementById('mode').textContent = getQueryParam('mode') || 'FM';
            document.getElementById('date').textContent = getQueryParam('date') || '-';
            document.getElementById('time').textContent = getQueryParam('time') || '-';
            document.getElementById('freq').textContent = getQueryParam('freq') || '-';
            document.getElementById('rst').textContent = getQueryParam('rst') || '-';
            document.getElementById('power').textContent = getQueryParam('power') || '-';
            document.getElementById('radio').textContent = getQueryParam('radio') || '-';
            document.getElementById('antenna').textContent = getQueryParam('antenna') || '-';
            document.getElementById('remark').textContent = getQueryParam('remark') || '-';

            const callsign = getQueryParam('callsign');
            if (callsign) {
                document.getElementById('qrzLink').href = 'https://www.qrz.com/db/' + callsign;
            }

            const shareUrl = window.location.href;
            new QRCode(document.getElementById("qrcode"), {
                text: shareUrl,
                width: 120,
                height: 120,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.L
            });
        </script>
    </body>
</html>
