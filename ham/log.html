    <style>
        :root {
            --primary-color: #ffffff;
            --secondary-color: #888888;
            --accent-color: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --glass-blur: blur(20px);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.5);
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
            --ease-out-back: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: #000000;
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
        }

        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: -2;
            overflow: hidden;
        }

        .video-bg {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.6;
            transition: opacity 0.8s var(--ease-out-expo), transform 8s ease-out;
        }

        .video-container.scrolled .video-bg {
            opacity: 0.3;
            transform: scale(1.05);
        }

        .video-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: linear-gradient(
                180deg,
                rgba(0, 0, 0, 0.5) 0%,
                rgba(0, 0, 0, 0.7) 50%,
                rgba(0, 0, 0, 0.9) 100%
            );
            z-index: -1;
            pointer-events: none;
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: 1.5rem 3rem;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.6s var(--ease-out-expo);
        }

        nav.scrolled {
            padding: 0.8rem 3rem;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);

            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);

            font-size: 1.4rem;

            color: var(--text-primary);
            letter-spacing: 6px;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 3rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 400;
            font-size: 0.85rem;
            letter-spacing: 2px;
            padding: 0.5rem 0;
            position: relative;
            transition: color 0.4s var(--ease-out-expo);
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 1px;
            background: var(--text-primary);
            transition: all 0.4s var(--ease-out-expo);
            transform: translateX(-50%);
        }

        .nav-links a:hover {
            color: var(--text-primary);
        }

        .nav-links a:hover::after {

        }

        .hero {

            align-items: center;
            text-align: center;
            padding: 8rem 2rem 3rem;

        }

            opacity: 0;
            transform: translateY(40px);
            animation: heroEnter 1.2s var(--ease-out-expo) forwards;
            animation-delay: 1.5s;

            }

            background: rgba(255, 255, 255, 0.2);
            transform: scaleX(0);
            transform-origin: left;

        .page-loader {

            left: 0;

        <script>
            const navbar = document.getElementById('navbar');
            const videoContainer = document.getElementById('videoContainer');

            window.addEventListener('scroll', function() {
                const scrollY = window.scrollY;
                
                if (scrollY > 50) {
                    navbar.classList.add('scrolled');
                    videoContainer.classList.add('scrolled');
                } else {
                    navbar.classList.remove('scrolled');
                    videoContainer.classList.remove('scrolled');
                }
            });

            let allLogs = [];

            async function loadLogs() {
                document.getElementById('pageLoader').classList.add('hidden');
                document.getElementById('loading').style.display = 'block';
                document.getElementById('noData').style.display = 'none';
                
                try {
                    const timestamp = new Date().getTime();
                    const response = await fetch(`log.csv?t=${timestamp}`);
                    const text = await response.text();
                    const lines = text.trim().split('\n');
                    
                    allLogs = [];
                    for (let i = 1; i < lines.length; i++) {
                        const values = lines[i].split(',');
                        if (values.length >= 10) {
                            allLogs.push({
                                date: values[0],
                                time: values[1],
                                callsign: values[2],
                                freq: values[3],
                                mode: values[4],
                                rst: values[5],
                                power: values[6],
                                radio: values[7],
                                antenna: values[8],
                                remark: values[9]
                            });
                        }
                    }
                    
                    updateStats();
                    renderTable(allLogs);
                    document.getElementById('loading').style.display = 'none';
                } catch (error) {
                    console.error('加载日志失败:', error);
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('noData').style.display = 'block';
                }
            }

            function updateStats() {
                const totalQsos = allLogs.length;
                const uniqueCallsigns = [...new Set(allLogs.map(log => log.callsign))].length;
                const freqs = allLogs.map(log => log.freq.split('MHz')[0] + 'MHz');
                const uniqueBands = [...new Set(freqs)].length;
                
                document.getElementById('totalQsos').textContent = totalQsos;
                document.getElementById('totalCallsigns').textContent = uniqueCallsigns;
                document.getElementById('totalBands').textContent = uniqueBands;
            }

            function renderTable(logs) {
                const tbody = document.getElementById('logTableBody');
                const noData = document.getElementById('noData');
                
                if (logs.length === 0) {
                    tbody.innerHTML = '';
                    noData.style.display = 'block';
                    return;
                }
                
                noData.style.display = 'none';
                tbody.innerHTML = logs.map((log, index) => `
                    <tr onclick="window.location.href='qso.html?date=${encodeURIComponent(log.date)}&time=${encodeURIComponent(log.time)}&callsign=${encodeURIComponent(log.callsign)}&freq=${encodeURIComponent(log.freq)}&mode=${encodeURIComponent(log.mode)}&rst=${encodeURIComponent(log.rst)}&power=${encodeURIComponent(log.power)}&radio=${encodeURIComponent(log.radio)}&antenna=${encodeURIComponent(log.antenna)}&remark=${encodeURIComponent(log.remark)}'">
                        <td>${log.date}</td>
                        <td><span class="callsign">${log.callsign}</span></td>
                        <td>${log.freq}</td>
                        <td><span class="mode-tag">${log.mode}</span></td>
                        <td><span class="signal-rst">${log.rst}</span></td>
                    </tr>
                `).join('');
            }

            function searchLogs() {
                const callsignQuery = document.getElementById('searchCallsign').value.toLowerCase();
                const modeQuery = document.getElementById('searchMode').value.toLowerCase();
                
                const filtered = allLogs.filter(log => {
                    const matchCallsign = log.callsign.toLowerCase().includes(callsignQuery);
                    const matchMode = log.mode.toLowerCase().includes(modeQuery);
                    return matchCallsign && matchMode;
                });
                
                renderTable(filtered);
            }

            function resetSearch() {
                document.getElementById('searchCallsign').value = '';
                document.getElementById('searchMode').value = '';
                renderTable(allLogs);
            }

            document.getElementById('searchBtn').addEventListener('click', searchLogs);
            document.getElementById('resetBtn').addEventListener('click', resetSearch);
            
            document.getElementById('searchCallsign').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') searchLogs();
            });
            document.getElementById('searchMode').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') searchLogs();
            });

            loadLogs();
        </script>
    </body>
</html>
