<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>业余无线电 A 类考试系统</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="navbar">
        <div class="navbar-content">
            <div class="navbar-brand">HAM EXAM <span id="classType">A 类</span></div>
            <div class="navbar-info">业余无线电考试系统</div>
            <div>
                <a href="favorites.html" class="navbar-btn">⭐ 收藏夹</a>
            </div>
        </div>
    </div>

    <div class="main-card">
        <div class="mode-selector">
            <h2>选择练习模式</h2>
            <p>开始您的学习之旅</p>
            
            <div class="class-switcher">
                <button class="class-btn active" id="classA" onclick="switchClass('A')">📖 A 类</button>
                <button class="class-btn" id="classB" onclick="switchClass('B')">🎓 B 类</button>
            </div>
            
            <div class="mode-grid" id="modeGrid">
                <a href="practice.html" class="mode-card practice">
                    <h2>📚 顺序练习</h2>
                    <p>按题库顺序逐题练习，每题答完后立即显示正确答案和解析，适合日常学习和记忆。</p>
                </a>

                <a href="exam.html" class="mode-card exam">
                    <h2>📝 A 类模拟考试</h2>
                    <p>随机抽取 40 道题（单选 32 题 + 多选 8 题），答题时间 40 分钟，答对 30 题为合格，模拟真实考试环境。</p>
                </a>

                <a href="review.html" class="mode-card review">
                    <h2>❌ 错题回顾</h2>
                    <p>专门练习之前做错的题目，针对性复习薄弱环节，巩固知识点。</p>
                </a>
            </div>
        </div>

        <div class="stats-preview">
            <h3>📊 学习统计</h3>
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-value" id="totalWrong">0</div>
                    <div class="stat-label">错题数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="totalQuestions">0</div>
                    <div class="stat-label">总题数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="progressRate">0%</div>
                    <div class="stat-label">进度</div>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>Design By BG7LZQ</p>
        <p>鸣谢 高州市业余无线电协会</p>
        <button onclick="resetAll()">🔄 重置所有进度</button>
    </div>

    <script>
        let currentClass = 'A';
        
        async function switchClass(cls) {
            currentClass = cls;
            
            // 更新按钮样式
            document.getElementById('classA').className = cls === 'A' ? 'class-btn active' : 'class-btn';
            document.getElementById('classB').className = cls === 'B' ? 'class-btn b-active' : 'class-btn';
            
            // 更新标题
            document.getElementById('classType').textContent = cls + '类';
            
            // 更新模式卡片
            const modeGrid = document.getElementById('modeGrid');
            if (cls === 'A') {
                modeGrid.innerHTML = `
                    <a href="practice.html" class="mode-card practice">
                        <h2>📚 顺序练习</h2>
                        <p>按题库顺序逐题练习，每题答完后立即显示正确答案和解析，适合日常学习和记忆。</p>
                    </a>

                    <a href="exam.html" class="mode-card exam">
                        <h2>📝 A 类模拟考试</h2>
                        <p>随机抽取 40 道题（单选 32 题 + 多选 8 题），答题时间 40 分钟，答对 30 题为合格，模拟真实考试环境。</p>
                    </a>

                    <a href="review.html" class="mode-card review">
                        <h2>❌ 错题回顾</h2>
                        <p>专门练习之前做错的题目，针对性复习薄弱环节，巩固知识点。</p>
                    </a>
                `;
                await loadStats('A');
            } else {
                modeGrid.innerHTML = `
                    <a href="b_practice.html" class="mode-card practice">
                        <h2>📚 顺序练习</h2>
                        <p>按题库顺序逐题练习，每题答完后立即显示正确答案和解析，适合日常学习和记忆。</p>
                    </a>

                    <a href="b_class_exam.html" class="mode-card b-exam">
                        <h2>🎓 B 类模拟考试</h2>
                        <p>随机抽取 60 道题（单选 45 题 + 多选 15 题），答题时间 60 分钟，答对 45 题为合格，适合进阶学习。</p>
                    </a>

                    <a href="b_review.html" class="mode-card review">
                        <h2>❌ 错题回顾</h2>
                        <p>专门练习之前做错的题目，针对性复习薄弱环节，巩固知识点。</p>
                    </a>
                `;
                await loadStats('B');
            }
            
            // 保存到 localStorage
            localStorage.setItem('hamExamClass', cls);
        }
        
        async function loadStats(cls) {
            let wrongQuestions = [];
            let answeredCount = 0;
            let totalQuestions = 0;
            
            // 从 CSV 文件获取题库总题数
            try {
                const csvFile = cls === 'A' ? '业余无线电 A 类.csv' : '业余无线电 B 类.csv';
                const response = await fetch(csvFile);
                const csvText = await response.text();
                const lines = csvText.trim().split('\n');
                totalQuestions = lines.length - 1; // 减去标题行
            } catch (error) {
                console.error('获取题库失败:', error);
                totalQuestions = cls === 'A' ? 40 : 60; // 默认值
            }
            
            if (cls === 'A') {
                // A 类 - 从 practiceProgress 读取
                wrongQuestions = JSON.parse(localStorage.getItem('hamExamWrongQuestions') || '[]');
                const progress = JSON.parse(localStorage.getItem('practiceProgress') || '{}');
                answeredCount = progress.answeredCount || 0;
            } else {
                // B 类 - 从 hamExamBProgress_answers 读取
                wrongQuestions = JSON.parse(localStorage.getItem('hamExamBWrongQuestions') || '[]');
                const savedAnswers = JSON.parse(localStorage.getItem('hamExamBProgress_answers') || '{}');
                answeredCount = Object.keys(savedAnswers).length;
            }
            
            document.getElementById('totalWrong').textContent = wrongQuestions.length;
            document.getElementById('totalQuestions').textContent = totalQuestions; // 显示题库总题数
            document.getElementById('progressRate').textContent = totalQuestions > 0 ? `${Math.round((answeredCount / totalQuestions) * 100)}%` : '0%';
        }

        function resetAll() {
            if (confirm('确定要重置所有学习进度吗？\n\n这将清除：\n- 所有答题记录\n- 所有错题本\n- 所有学习统计\n\n此操作不可恢复！')) {
                // A 类
                localStorage.removeItem('hamExamProgress');
                localStorage.removeItem('hamExamWrongQuestions');
                localStorage.removeItem('practiceProgress');
                localStorage.removeItem('examProgress');
                // B 类
                localStorage.removeItem('hamExamBProgress_index');
                localStorage.removeItem('hamExamBProgress_answers');
                localStorage.removeItem('hamExamBProgress_correct');
                localStorage.removeItem('hamExamBProgress_wrongQuestions');
                localStorage.removeItem('hamExamBWrongQuestions');
                localStorage.removeItem('hamExamBReview_answers');
                localStorage.removeItem('hamExamBReview_correct');
                localStorage.removeItem('examProgress_B');
                
                alert('进度已重置！');
                location.reload();
            }
        }

        // 页面加载时恢复上次的类别
        window.onload = function() {
            const savedClass = localStorage.getItem('hamExamClass') || 'A';
            switchClass(savedClass);
        };
    </script>
</body>
</html>
