<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>业余无线电 B 类考试系统 - 查看解析</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="theme-b">
    <div class="navbar">
        <div class="navbar-content">
            <div class="navbar-brand">HAM EXAM - B 类考试解析</div>
            <div>
                <a href="b_class_exam.html" class="navbar-btn">← 返回考试</a>
                <a href="index.html" class="navbar-btn">← 返回主页</a>
            </div>
        </div>
    </div>

    <div class="main-card">
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="totalQuestions">0</div>
                <div class="stat-label">总题数</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="currentNumber">0</div>
                <div class="stat-label">当前题号</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="correctCount">0</div>
                <div class="stat-label">答对</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="wrongCount">0</div>
                <div class="stat-label">答错</div>
            </div>
        </div>

        <div class="question-area" id="questionArea">
            <div class="question-header">
                <div>
                    <div class="question-number" id="questionNumber">第 1 题</div>
                    <span class="question-type-tag" id="questionType">单选</span>
                </div>
                <div class="question-text" id="questionText">题目加载中...</div>
            </div>
            <div class="options" id="optionsContainer"></div>
        </div>

        <div class="navigation" id="navigation">
            <button class="nav-btn" id="prevBtn" onclick="previousQuestion()">← 上一题</button>
            <div class="progress-section">
                <div class="progress-header">
                    <span>查看进度</span>
                    <span id="progressText">0 / 0</span>
                </div>
                <div class="progress-track">
                    <div class="progress-bar" id="progressBar" style="width: 0%"></div>
                </div>
            </div>
            <button class="nav-btn" id="nextBtn" onclick="nextQuestion()">下一题 →</button>
        </div>
    </div>

    <div class="footer">
        <p>Design By BG7LZQ</p>
        <p>鸣谢 高州市业余无线电协会</p>
    </div>

    <script>
        let questions = [];
        let filteredQuestions = [];
        let currentQuestionIndex = 0;
        let userAnswers = {};
        let examProgress = null;

        function parseCSV(csvText) {
            const lines = csvText.trim().split('\n');
            const questions = [];
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i];
                const values = parseCSVLine(line);
                if (values.length >= 8) {
                    questions.push({
                        id: values[0],
                        uniqueId: `${values[0]}_${values[2]}`,
                        chapter: values[1],
                        code: values[2],
                        question: values[3],
                        answer: values[4],
                        optionA: values[5],
                        optionB: values[6],
                        optionC: values[7],
                        optionD: values[8] || ''
                    });
                }
            }
            return questions;
        }

        function parseCSVLine(line) {
            const values = [];
            let current = '';
            let inQuotes = false;
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') { inQuotes = !inQuotes; }
                else if (char === ',' && !inQuotes) { values.push(current.trim()); current = ''; }
                else { current += char; }
            }
            values.push(current.trim());
            return values;
        }

        async function loadExam() {
            try {
                const response = await fetch('业余无线电 B 类.csv');
                const csvText = await response.text();
                questions = parseCSV(csvText);
                
                // 先检查是否有收藏的试卷数据
                const favoriteExamData = localStorage.getItem('favoriteExamData');
                
                if (favoriteExamData) {
                    const favoriteExam = JSON.parse(favoriteExamData);
                    userAnswers = favoriteExam.answers || {};
                    
                    // 根据题目 ID 找到完整题目信息
                    filteredQuestions = favoriteExam.questions.map(qId => {
                        const fullQuestion = questions.find(fq => fq.uniqueId === qId);
                        return fullQuestion || { uniqueId: qId };
                    });
                    
                    // 清除收藏数据标记
                    localStorage.removeItem('favoriteExamData');
                } else {
                    examProgress = JSON.parse(localStorage.getItem('examProgress_B'));
                    
                    if (!examProgress || !examProgress.questions) {
                        document.getElementById('questionText').textContent = '未找到考试记录，请先完成一场模拟考试。';
                        document.getElementById('navigation').classList.add('hidden');
                        return;
                    }
                    
                    filteredQuestions = examProgress.questions.map(q => 
                        questions.find(qq => qq.uniqueId === q.uniqueId)
                    ).filter(q => q);
                    
                    userAnswers = examProgress.userAnswers || {};
                }
                
                currentQuestionIndex = 0;
                showQuestion(currentQuestionIndex);
                updateStats();
            } catch (error) {
                console.error('加载失败:', error);
                document.getElementById('questionText').textContent = '加载失败';
            }
        }

        function showQuestion(index) {
            const question = filteredQuestions[index];
            const isMultiple = question.answer.length > 1;
            
            document.getElementById('questionNumber').textContent = `第 ${index + 1} 题 / 共 ${filteredQuestions.length} 题`;
            document.getElementById('questionText').textContent = question.question;
            
            const typeTag = document.getElementById('questionType');
            typeTag.textContent = isMultiple ? '多选' : '单选';
            typeTag.className = 'question-type-tag' + (isMultiple ? ' multi' : '');
            
            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';

            const options = [
                { letter: 'A', text: question.optionA },
                { letter: 'B', text: question.optionB },
                { letter: 'C', text: question.optionC },
                { letter: 'D', text: question.optionD }
            ].filter(opt => opt.text);

            const userAnswer = userAnswers[question.uniqueId];
            
            options.forEach((option, idx) => {
                const optionDiv = document.createElement('div');
                optionDiv.className = 'option';
                
                const isCorrect = option.letter === question.answer;
                const isUserAnswer = Array.isArray(userAnswer) 
                    ? userAnswer.includes(option.letter)
                    : userAnswer === option.letter;
                
                if (isCorrect) {
                    optionDiv.classList.add('correct');
                }
                if (!isCorrect && isUserAnswer) {
                    optionDiv.classList.add('incorrect');
                }
                
                optionDiv.innerHTML = `
                    <div class="option-letter">${option.letter}</div>
                    <div class="option-text">${option.text}</div>
                `;
                optionsContainer.appendChild(optionDiv);
            });

            updateProgress();
            updateNavButtons();
        }

        function previousQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                showQuestion(currentQuestionIndex);
            }
        }

        function nextQuestion() {
            if (currentQuestionIndex < filteredQuestions.length - 1) {
                currentQuestionIndex++;
                showQuestion(currentQuestionIndex);
            }
        }

        function updateNavButtons() {
            document.getElementById('prevBtn').disabled = currentQuestionIndex === 0;
            document.getElementById('nextBtn').disabled = currentQuestionIndex === filteredQuestions.length - 1;
        }

        function updateProgress() {
            const progress = ((currentQuestionIndex + 1) / filteredQuestions.length) * 100;
            document.getElementById('progressBar').style.width = `${progress}%`;
            document.getElementById('progressText').textContent = `${currentQuestionIndex + 1} / ${filteredQuestions.length}`;
        }

        function updateStats() {
            document.getElementById('totalQuestions').textContent = filteredQuestions.length;
            document.getElementById('currentNumber').textContent = currentQuestionIndex + 1;
            
            let correct = 0;
            let wrong = 0;
            
            filteredQuestions.forEach(q => {
                const userAnswer = userAnswers[q.uniqueId];
                if (userAnswer !== undefined) {
                    const isCorrect = Array.isArray(userAnswer) 
                        ? userAnswer.join('') === q.answer 
                        : userAnswer === q.answer;
                    
                    if (isCorrect) {
                        correct++;
                    } else {
                        wrong++;
                    }
                } else {
                    wrong++;
                }
            });
            
            document.getElementById('correctCount').textContent = correct;
            document.getElementById('wrongCount').textContent = wrong;
        }

        window.onload = loadExam;
    </script>
</body>
</html>
