<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>业余无线电 A 类考试系统 - 查看解析</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="navbar">
        <div class="navbar-content">
            <div class="navbar-brand">HAM EXAM - 查看解析</div>
            <a href="exam.html" class="navbar-btn">← 返回考试</a>
        </div>
    </div>

    <div class="main-card">
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="totalQuestions">50</div>
                <div class="stat-label">总题数</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="currentNumber">0</div>
                <div class="stat-label">当前题号</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="correctCount">0</div>
                <div class="stat-label">答对数</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="wrongCount">0</div>
                <div class="stat-label">答错数</div>
            </div>
        </div>

        <div class="question-area">
            <div class="question-header">
                <div>
                    <div class="question-number" id="questionNumber">第 1 题</div>
                    <span class="question-type-tag" id="questionType">单选</span>
                </div>
                <div class="question-text" id="questionText">题目加载中...</div>
            </div>
            <div class="options" id="optionsContainer"></div>
            <div class="feedback" id="feedback"></div>
        </div>

        <div class="navigation">
            <button class="nav-btn" id="prevBtn" onclick="previousQuestion()">← 上一题</button>
            <div class="progress-section">
                <div class="progress-header">
                    <span>浏览进度</span>
                    <span id="progressText">0 / 50</span>
                </div>
                <div class="progress-track">
                    <div class="progress-bar" id="progressBar" style="width: 0%"></div>
                </div>
            </div>
            <button class="nav-btn" id="nextBtn" onclick="nextQuestion()">下一题 →</button>
        </div>
    </div>

    <div class="footer">
        <p>Design By BG7LZQ</p>
        <p>鸣谢 高州市业余无线电协会</p>
    </div>

    <script>
        let filteredQuestions = [];
        let currentQuestionIndex = 0;
        let userAnswers = {};
        let examQuestions = [];

        function parseCSV(csvText) {
            const lines = csvText.trim().split('\n');
            const questions = [];
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i];
                const values = parseCSVLine(line);
                if (values.length >= 8) {
                    questions.push({
                        id: values[0],
                        uniqueId: `${values[0]}_${values[2]}`,
                        chapter: values[1],
                        code: values[2],
                        question: values[3],
                        answer: values[4],
                        optionA: values[5],
                        optionB: values[6],
                        optionC: values[7],
                        optionD: values[8] || ''
                    });
                }
            }
            return questions;
        }

        function parseCSVLine(line) {
            const values = [];
            let current = '';
            let inQuotes = false;
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') { inQuotes = !inQuotes; }
                else if (char === ',' && !inQuotes) { values.push(current.trim()); current = ''; }
                else { current += char; }
            }
            values.push(current.trim());
            return values;
        }

        async function loadExam() {
            try {
                // 加载题库
                const response = await fetch('业余无线电 A 类.csv');
                const csvText = await response.text();
                const allQuestions = parseCSV(csvText);
                
                // 先检查是否有收藏的试卷数据
                const favoriteExamData = localStorage.getItem('favoriteExamData');
                
                if (favoriteExamData) {
                    const favoriteExam = JSON.parse(favoriteExamData);
                    userAnswers = favoriteExam.answers || {};
                    
                    // 根据题目 ID 找到完整题目信息
                    filteredQuestions = favoriteExam.questions.map(qId => {
                        const fullQuestion = allQuestions.find(fq => fq.uniqueId === qId);
                        return fullQuestion || { uniqueId: qId };
                    });
                    
                    // 清除收藏数据标记
                    localStorage.removeItem('favoriteExamData');
                } else {
                    // 从 localStorage 获取考试数据
                    const examProgress = JSON.parse(localStorage.getItem('examProgress') || '{}');
                    examQuestions = examProgress.questions || [];
                    userAnswers = examProgress.userAnswers || {};
                    
                    // 根据题目 ID 找到完整题目信息
                    filteredQuestions = examQuestions.map(q => {
                        const fullQuestion = allQuestions.find(fq => fq.uniqueId === q.uniqueId);
                        return fullQuestion || q;
                    });
                }
                
                if (filteredQuestions.length === 0) {
                    alert('没有可查看的考试记录，请先参加一场考试。');
                    window.location.href = 'exam.html';
                    return;
                }
                
                showQuestion(0);
                updateStats();
            } catch (error) {
                console.error('加载失败:', error);
                alert('加载失败，请确保 CSV 文件存在。');
            }
        }

        function showQuestion(index) {
            const question = filteredQuestions[index];
            const isMultiple = question.answer.length > 1;
            
            document.getElementById('questionNumber').textContent = `第 ${index + 1} 题 / 共 ${filteredQuestions.length} 题`;
            document.getElementById('questionText').textContent = question.question;
            
            const typeTag = document.getElementById('questionType');
            typeTag.textContent = isMultiple ? '多选' : '单选';
            typeTag.className = 'question-type-tag' + (isMultiple ? ' multi' : '');
            
            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';

            const options = [
                { letter: 'A', text: question.optionA },
                { letter: 'B', text: question.optionB },
                { letter: 'C', text: question.optionC },
                { letter: 'D', text: question.optionD }
            ].filter(opt => opt.text);

            options.forEach((option, idx) => {
                const optionDiv = document.createElement('div');
                optionDiv.className = 'option';
                optionDiv.innerHTML = `
                    <div class="option-letter">${option.letter}</div>
                    <div class="option-text">${option.text}</div>
                `;
                optionsContainer.appendChild(optionDiv);
            });

            // 显示用户答案和正确答案
            showResult(question, userAnswers[question.uniqueId]);

            updateProgress();
            updateNavButtons();
        }

        function showResult(question, userAnswer) {
            const feedback = document.getElementById('feedback');
            const isMultiple = question.answer.length > 1;
            
            let userAnswerText = userAnswer || '未作答';
            if (isMultiple && Array.isArray(userAnswer)) {
                userAnswerText = userAnswer.join('');
            }
            
            const isCorrect = Array.isArray(userAnswer) 
                ? userAnswer.join('') === question.answer 
                : userAnswer === question.answer;
            
            if (feedback) {
                feedback.className = 'feedback ' + (isCorrect ? 'correct' : 'incorrect');
                feedback.innerHTML = `
                    <div class="feedback-title">${isCorrect ? '✓ 回答正确' : '✗ 回答错误'}</div>
                    ${!isCorrect ? `你的答案：${userAnswerText}<br>` : ''}正确答案：${question.answer}
                `;
            }

            const options = document.querySelectorAll('.option');
            const correctAnswersArr = question.answer.split('');
            
            options.forEach(opt => {
                const letter = opt.querySelector('.option-letter').textContent;
                
                // 正确答案标记为绿色
                if (correctAnswersArr.includes(letter)) {
                    opt.classList.add('correct');
                }
                // 用户选择的错误答案标记为红色
                else if (userAnswer) {
                    const userAnswersArr = isMultiple && Array.isArray(userAnswer) ? userAnswer : [userAnswer];
                    if (userAnswersArr.includes(letter) && !correctAnswersArr.includes(letter)) {
                        opt.classList.add('incorrect');
                    }
                }
                
                opt.classList.add('disabled');
            });
        }

        function previousQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                showQuestion(currentQuestionIndex);
            }
        }

        function nextQuestion() {
            if (currentQuestionIndex < filteredQuestions.length - 1) {
                currentQuestionIndex++;
                showQuestion(currentQuestionIndex);
            }
        }

        function updateNavButtons() {
            document.getElementById('prevBtn').disabled = currentQuestionIndex === 0;
            document.getElementById('nextBtn').disabled = currentQuestionIndex === filteredQuestions.length - 1;
        }

        function updateProgress() {
            const progress = ((currentQuestionIndex + 1) / filteredQuestions.length) * 100;
            document.getElementById('progressBar').style.width = `${progress}%`;
            document.getElementById('progressText').textContent = `${currentQuestionIndex + 1} / ${filteredQuestions.length}`;
        }

        function updateStats() {
            document.getElementById('totalQuestions').textContent = filteredQuestions.length;
            document.getElementById('currentNumber').textContent = currentQuestionIndex + 1;
            
            let correct = 0;
            let wrong = 0;
            
            filteredQuestions.forEach(q => {
                const userAnswer = userAnswers[q.uniqueId];
                if (userAnswer !== undefined) {
                    const isCorrect = Array.isArray(userAnswer) 
                        ? userAnswer.join('') === q.answer 
                        : userAnswer === q.answer;
                    
                    if (isCorrect) {
                        correct++;
                    } else {
                        wrong++;
                    }
                } else {
                    wrong++;
                }
            });
            
            document.getElementById('correctCount').textContent = correct;
            document.getElementById('wrongCount').textContent = wrong;
        }

        window.onload = loadExam;
    </script>
</body>
</html>
